<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة شجرة الكلمات والقرد - أصوات مدمجة مضمونة</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #eef7f2;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
        }
        h1 { color: #2e7d32; margin-top: 5px; font-size: 24px; }
        .setup-screen {
            background: white;
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            margin: 20px auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        textarea {
            width: 90%;
            height: 100px;
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #a5d6a7;
            margin-bottom: 15px;
        }
        button {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
        }
        button:hover { background-color: #388e3c; }
        
        .game-screen { display: none; position: relative; max-width: 600px; margin: auto; }
        
        .level-badge {
            background-color: #0288d1;
            color: white;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 18px;
            display: inline-block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .tree-container {
            position: relative;
            width: 100%;
            height: 420px;
            margin-top: -20px;
        }
        .tree-bg {
            font-size: 320px;
            line-height: 1.1;
            margin: 0;
            filter: drop-shadow(0 8px 8px rgba(0,0,0,0.15));
        }
        
        .fruit {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.8s ease-in-out;
            z-index: 10;
        }
        .fruit-icon {
            font-size: 60px;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.25));
        }
        .fruit-text {
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            font-size: 24px;
            padding: 4px 14px;
            border-radius: 12px;
            border: 2px solid #ff9800;
            margin-top: -5px;
            white-space: nowrap;
            box-shadow: 0 3px 6px rgba(0,0,0,0.15);
        }
        
        @keyframes shake {
            0%, 100% { transform: scale(1.2) translateX(0); }
            25% { transform: scale(1.2) translateX(-8px); }
            75% { transform: scale(1.2) translateX(8px); }
        }
        .shake-fruit {
            animation: shake 0.4s ease-in-out;
        }
        
        .bottom-container {
            position: relative;
            height: 140px;
            margin-top: -10px;
        }
        .monkey {
            font-size: 100px;
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            transition: transform 0.2s;
        }
        
        .controls { 
            margin-top: 15px; 
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .score { font-size: 20px; color: #2e7d32; font-weight: bold; margin-bottom: 5px; }
        
        .fall-to-monkey {
            left: 50% !important;
            top: 390px !important;
            transform: translateX(-50%) scale(0.2) !important;
            opacity: 0;
        }
    </style>
</head>
<body>

    <h1>لعبة شجرة الكلمات والقرد 🌳🐒</h1>

    <div id="setupScreen" class="setup-screen">
        <h3 style="color: #0288d1;">كلمات المستوى الأول:</h3>
        <textarea id="level1Input">أَفَلَ&#10;أَبَقَ&#10;كَتَبَ&#10;حَكَمَ&#10;جَهَرَ&#10;يَدَكَ&#10;نَبَأَ&#10;شَكَرَ</textarea>
        
        <h3 style="color: #e65100;">كلمات المستوى الثاني:</h3>
        <textarea id="level2Input">وَسَلَكَ&#10;وَقَعَدَ&#10;فَحَشَرَ&#10;وَذَكَرَ&#10;عَبَدَ وَ حَمَدَ&#10;كَتَبَ وَ شَرَحَ</textarea>
        <br>
        <button onclick="startGame()">ابدأ اللعبة التفاعلية 🚀</button>
    </div>

    <div id="gameScreen" class="game-screen">
        <div id="levelBadge" class="level-badge">المستوى 1</div>
        <div class="score">الفاكهة المتبقية في هذا المستوى: <span id="remainingCount">0</span></div>
        
        <div class="tree-container">
            <div class="tree-bg">🌳</div>
            <div id="treeFruits"></div>
        </div>

        <div class="bottom-container">
            <div id="monkey" class="monkey">🐒</div>
        </div>

        <div class="controls">
            <button id="wrongBtn" style="background-color: #f44336; font-size: 20px; border-radius: 20px;" onclick="wrongAnswer()">❌ إجابة خاطئة</button>
            <button id="eatBtn" style="background-color: #4caf50; font-size: 20px; border-radius: 20px;" onclick="eatFruit()">✓ قراءة صحيحة! 🍏</button>
        </div>
    </div>

    <script>
        let currentLevel = 1;
        let level1Words = [];
        let level2Words = [];
        let currentWordsList = [];
        let currentFruitIndex = 0;
        
        const fruitEmojis = ['🍎', '🍊', '🍓', '🍋', '🍏', '🍒'];
        
        const positions = [
            {top: '40px', left: '38%'}, {top: '70px', left: '55%'},
            {top: '110px', left: '18%'}, {top: '100px', left: '72%'},
            {top: '170px', left: '34%'}, {top: '160px', left: '58%'},
            {top: '210px', left: '12%'}, {top: '220px', left: '74%'},
            {top: '260px', left: '44%'}, {top: '270px', left: '26%'}
        ];

        // 🗣️ دالة سحرية تستخدم صوت الجهاز الداخلي مباشرة (مضمونة 100% ولا تحتاج إنترنت)
        function playSystemSound(message, isWrong = false) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // إيقاف أي صوت سابق لتجنب التداخل
                
                const utterance = new SpeechSynthesisUtterance(message);
                utterance.lang = 'ar-SA'; // لغة عربية
                
                if (isWrong) {
                    utterance.pitch = 0.8; // صوت منخفض عند الخطأ
                    utterance.rate = 1.0;
                } else {
                    utterance.pitch = 1.4; // صوت طفولي حماسي ومبهج عند النجاح
                    utterance.rate = 1.0;  // سرعة مناسبة
                }
                
                window.speechSynthesis.speak(utterance);
            }
        }

        function startGame() {
            // تفعيل نظام الصوت فوراً عند أول ضغطة زر لتفادي حظر المتصفح
            playSystemSound("أهلاً بكَ في اللعبة");

            const l1Input = document.getElementById('level1Input').value.trim();
            const l2Input = document.getElementById('level2Input').value.trim();
            
            if(!l1Input || !l2Input) {
                alert('الرجاء التأكد من كتابة الكلمات للمستويين!');
                return;
            }
            
            level1Words = l1Input.split('\n').map(w => w.trim()).filter(w => w !== "");
            level2Words = l2Input.split('\n').map(w => w.trim()).filter(w => w !== "");
            
            currentLevel = 1;
            setupLevel();
            
            document.getElementById('setupScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
        }

        function setupLevel() {
            currentFruitIndex = 0;
            if(currentLevel === 1) {
                currentWordsList = level1Words;
                document.getElementById('levelBadge').innerText = "المستوى 1: كلمات ثلاثية ✨";
                document.getElementById('levelBadge').style.backgroundColor = "#0288d1";
            } else {
                currentWordsList = level2Words;
                document.getElementById('levelBadge').innerText = "المستوى 2: كلمات متقدمة 🔥";
                document.getElementById('levelBadge').style.backgroundColor = "#e65100";
            }
            renderTree();
        }

        function renderTree() {
            const container = document.getElementById('treeFruits');
            container.innerHTML = '';
            document.getElementById('remainingCount').innerText = currentWordsList.length - currentFruitIndex;

            currentWordsList.forEach((word, index) => {
                if (index < currentFruitIndex) return;

                const fruitDiv = document.createElement('div');
                fruitDiv.className = 'fruit';
                fruitDiv.id = `fruit-${index}`;
                
                const pos = positions[index % positions.length];
                const emoji = fruitEmojis[index % fruitEmojis.length];
                
                fruitDiv.style.top = pos.top;
                fruitDiv.style.left = pos.left;
                
                if (index !== currentFruitIndex) {
                    fruitDiv.style.opacity = '0.25';
                    fruitDiv.style.transform = 'scale(0.7)';
                } else {
                    fruitDiv.style.opacity = '1';
                    fruitDiv.style.transform = 'scale(1.25)';
                    fruitDiv.style.zIndex = '20';
                }

                fruitDiv.innerHTML = `
                    <span class="fruit-icon">${emoji}</span>
                    <span class="fruit-text">${word}</span>
                `;
                container.appendChild(fruitDiv);
            });
        }

        function eatFruit() {
            if (currentFruitIndex >= currentWordsList.length) return;
            
            document.getElementById('eatBtn').disabled = true;
            document.getElementById('wrongBtn').disabled = true;
            
            const currentFruit = document.getElementById(`fruit-${currentFruitIndex}`);
            const monkey = document.getElementById('monkey');
            
            if (currentFruit) {
                currentFruit.classList.add('fall-to-monkey');
                monkey.innerHTML = '😮';
                
                setTimeout(() => {
                    // صوت أكل الفاكهة مصاحب بنطق هممم لذيذ
                    playSystemSound("هَمْ! لَذِيذ!");
                    monkey.innerHTML = '😋';
                    currentFruit.remove();
                    
                    currentFruitIndex++;
                    
                    document.getElementById('eatBtn').disabled = false;
                    document.getElementById('wrongBtn').disabled = false;
                    
                    if (currentFruitIndex < currentWordsList.length) {
                        setTimeout(() => {
                            monkey.innerHTML = '🐒';
                            renderTree();
                        }, 400);
                    } else {
                        if (currentLevel === 1) {
                            setTimeout(() => {
                                monkey.innerHTML = '👏🎉🐒🥳';
                                // نطق تشجيع وتصفيق كلامي حقيقي بصوت النظام
                                playSystemSound("يَاي! أَحْسَنْتَ يَا بَطَلْ! تَصْفِيقٌ حَارٌ لَكْ!");
                                alert('👏 تصفيق حار! ياي أحسنتَ يا بطل! لقد أنهيت المستوى الأول بنجاح! جاهز للمستوى الثاني؟ 💪🚀');
                                currentLevel = 2;
                                monkey.innerHTML = '🐒';
                                setupLevel();
                            }, 500);
                        } else {
                            setTimeout(() => {
                                monkey.innerHTML = '👏👑🐒🏆';
                                monkey.style.transform = 'translateX(-50%) scale(1.6)';
                                // نطق الفوز النهائي المبهج
                                playSystemSound("هَاي! مُمْتَازٌ جِدًّا جِدًّا! أَنْتَ رَائِعٌ وَلَقَدْ فَزْتَ بِاللَّقَبْ! هِيييه!");
                                alert('👏 تصفيق وتشجيع كبير! هاي! ممتاز جداً! لقد ختمت كل المستويات بنجاح باهر! 🥳🏆👑');
                            }, 500);
                        }
                    }
                }, 800);
            }
        }

        function wrongAnswer() {
            if (currentFruitIndex >= currentWordsList.length) return;
            
            const monkey = document.getElementById('monkey');
            const currentFruit = document.getElementById(`fruit-${currentFruitIndex}`);
            
            playSystemSound("أُوهْ! حَاوِلْ مَرَّةً أُخْرَى", true);
            monkey.innerHTML = '😢';
            
            if (currentFruit) {
                currentFruit.classList.add('shake-fruit');
                setTimeout(() => {
                    currentFruit.classList.remove('shake-fruit');
                }, 400);
            }
            
            setTimeout(() => {
                if (currentFruitIndex < currentWordsList.length) {
                    monkey.innerHTML = '🐒';
                }
            }, 1500);
        }
    </script>
</body>
</html>
